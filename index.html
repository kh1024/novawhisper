    <style>
      /* Critical inline styles so the browser can paint the app shell BEFORE
         any JS or external CSS is parsed — gives First Contentful Paint
         something to render immediately. React replaces #root on mount. */
      html, body { margin: 0; padding: 0; background: #0b1018; color: #e6edf6; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      #root { min-height: 100vh; }
      .app-boot { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #6b7a90; font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; }
      .app-boot::before { content: ""; width: 14px; height: 14px; border-radius: 50%; border: 2px solid #1f2a3d; border-top-color: #3b82f6; margin-right: 10px; animation: app-boot-spin 0.8s linear infinite; display: inline-block; }
      @keyframes app-boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>

  <body>
    <div id="root"><div class="app-boot">Loading Nova</div></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
